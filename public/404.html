<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | 空底プール</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&display=swap"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background-color: #5a8196;
        font-family: "Zen Kurenaido", sans-serif;
        font-weight: 400;
        font-style: normal;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      main {
        text-align: center;
        color: #ffffff;
      }

      .code {
        font-size: 15vw;
        line-height: 1;
        color: #ffffff;
        letter-spacing: 0.05em;
      }

      .message {
        margin-top: 24px;
        font-size: 16px;
        letter-spacing: 0.1em;
        color: #ffffff;
      }

      .message-en {
        margin-top: 8px;
        font-size: 12px;
        letter-spacing: 0.2em;
        color: #cfe8e6;
        text-transform: uppercase;
      }

      a.back-link {
        display: inline-block;
        margin-top: 40px;
        color: #cfe8e6;
        font-size: 14px;
        letter-spacing: 0.1em;
        text-decoration: none;
        border-bottom: 1px solid rgba(207, 232, 230, 0.4);
        padding-bottom: 4px;
        transition: opacity 0.3s ease;
      }

      a.back-link:hover {
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="code">404</p>
      <p class="message">ページが見つかりませんでした</p>
      <p class="message-en">page not found</p>
      <a class="back-link" href="https://sorasoko-pool.netlify.app/">空底プールに戻る</a>
    </main>
  </body>
</html>
